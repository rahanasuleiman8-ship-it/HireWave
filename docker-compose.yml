version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: hirewave_db
    environment:
      POSTGRES_USER: hirewave
      POSTGRES_PASSWORD: hirewave123
      POSTGRES_DB: hirewavedb
    ports:
      - "5433:5432"
    volumes:
      - hirewave_pgdata:/var/lib/postgresql/data

volumes:
  hirewave_pgdata:
