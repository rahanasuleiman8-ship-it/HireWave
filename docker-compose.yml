services:
  postgres:
    image: postgres:16
    container_name: hirewave_db
    environment:
      POSTGRES_USER: hirewave
      POSTGRES_PASSWORD: hirewave123
      POSTGRES_DB: hirewavedb
    ports:
      - "5433:5432"
    volumes:
      - hirewave_pgdata:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: hirewave_mail
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  hirewave_pgdata:
